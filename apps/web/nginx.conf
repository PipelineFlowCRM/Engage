server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — any non-/api, non-/p, non-/admin route serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Static assets get long cache TTL (Vite emits hashed filenames).
  location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
  }

  # /api → Express
  location ^~ /api/ {
    proxy_pass http://api:4100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # /p/preferences/:token public center — handled by Express. The SPA also
  # serves /p/preferences/:token; the API equivalent lives at the same path.
  # We split: the SPA renders the UI (HTML) at /p/preferences/<token>, and
  # the API serves the JSON used by the UI at the same path. This nginx
  # config sends the bare path to the SPA and any /api-prefixed JSON calls
  # the SPA makes to the API. The SPA fetches via fetch('/p/preferences/<token>')
  # which we route to the API for JSON. Since the SPA HTML and the API JSON
  # share a path, we differentiate by Accept header (SPA wants HTML; the
  # SPA's fetch sends Accept: application/json).
  location ^~ /p/ {
    if ($http_accept ~* "application/json") {
      proxy_pass http://api:4100;
    }
    try_files $uri $uri/ /index.html;
  }

  # Bull-board dashboard, served by api at /admin/queues.
  location ^~ /admin/queues {
    proxy_pass http://api:4100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
