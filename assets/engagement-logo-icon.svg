<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PipelineFlow Engagement icon">
  <defs>
    <linearGradient id="eng-bg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="55%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="eng-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.6"/>
      <feOffset dx="0" dy="0.6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="80" height="80" rx="18" fill="url(#eng-bg)"/>

  <!-- Subtle motion arc behind (rhymes with PipelineFlow's curve) -->
  <path d="M14 64 Q26 50 38 38" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <circle cx="14" cy="64" r="2.6" fill="#FFFFFF" opacity="0.7"/>

  <!-- Speech bubble -->
  <g filter="url(#eng-shadow)">
    <rect x="20" y="18" width="44" height="32" rx="8" fill="#FFFFFF"/>
    <path d="M28 50 L26 60 L36 50 Z" fill="#FFFFFF"/>
  </g>

  <!-- 3 channel dots (echoing the gradient stops) -->
  <circle cx="32" cy="34" r="3.2" fill="#6366F1"/>
  <circle cx="42" cy="34" r="3.2" fill="#A855F7"/>
  <circle cx="52" cy="34" r="3.2" fill="#EC4899"/>
</svg>
