<svg viewBox="0 0 620 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PipelineFlow Engagement logo">
  <defs>
    <linearGradient id="eng-bg" x1="8" y1="10" x2="80" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="55%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="flow-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="eng-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g transform="translate(10 10)">
    <rect width="80" height="80" rx="18" fill="url(#eng-bg)"/>
    <path d="M14 64 Q26 50 38 38" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>
    <circle cx="14" cy="64" r="2.6" fill="#FFFFFF" opacity="0.7"/>
    <rect x="20" y="18" width="44" height="32" rx="8" fill="#FFFFFF"/>
    <path d="M28 50 L26 60 L36 50 Z" fill="#FFFFFF"/>
    <circle cx="32" cy="34" r="3.2" fill="#6366F1"/>
    <circle cx="42" cy="34" r="3.2" fill="#A855F7"/>
    <circle cx="52" cy="34" r="3.2" fill="#EC4899"/>
  </g>

  <!-- Wordmark: Pipeline | Flow | Engagement -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" letter-spacing="-1">
    <text x="106" y="64" font-size="44" font-weight="600" fill="#1F2937" textLength="178" lengthAdjust="spacingAndGlyphs">Pipeline</text>
    <text x="286" y="64" font-size="44" font-weight="800" fill="url(#flow-text)" textLength="106" lengthAdjust="spacingAndGlyphs">Flow</text>
    <text x="404" y="64" font-size="44" font-weight="600" fill="url(#eng-text)" textLength="206" lengthAdjust="spacingAndGlyphs">Engagement</text>
  </g>
</svg>
