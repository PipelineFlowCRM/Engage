<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PipelineFlow Engagement feature graphic">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#FDF2F8"/>
    </linearGradient>

    <linearGradient id="eng-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="55%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>

    <linearGradient id="flow-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>

    <linearGradient id="eng-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>

    <radialGradient id="orb-1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>

    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="soft-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <symbol id="eng-icon" viewBox="0 0 80 80">
      <rect width="80" height="80" rx="18" fill="url(#eng-grad)"/>
      <path d="M14 64 Q26 50 38 38" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>
      <circle cx="14" cy="64" r="2.6" fill="#FFFFFF" opacity="0.7"/>
      <rect x="20" y="18" width="44" height="32" rx="8" fill="#FFFFFF"/>
      <path d="M28 50 L26 60 L36 50 Z" fill="#FFFFFF"/>
      <circle cx="32" cy="34" r="3.2" fill="#6366F1"/>
      <circle cx="42" cy="34" r="3.2" fill="#A855F7"/>
      <circle cx="52" cy="34" r="3.2" fill="#EC4899"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-grad)"/>
  <circle cx="120" cy="80" r="320" fill="url(#orb-1)"/>
  <circle cx="1180" cy="600" r="360" fill="url(#orb-2)"/>

  <!-- Left: branding -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
    <use href="#eng-icon" x="64" y="80" width="84" height="84"/>
    <g font-size="38" letter-spacing="-1">
      <text x="162" y="138" font-weight="600" fill="#0F172A" textLength="158" lengthAdjust="spacingAndGlyphs">Pipeline</text>
      <text x="322" y="138" font-weight="800" fill="url(#flow-text)" textLength="92" lengthAdjust="spacingAndGlyphs">Flow</text>
      <text x="64" y="180" font-weight="600" fill="url(#eng-text)" textLength="186" lengthAdjust="spacingAndGlyphs">Engagement</text>
    </g>

    <text x="64" y="288" font-size="56" font-weight="800" fill="#0F172A" letter-spacing="-1.5">Send anywhere.</text>
    <text x="64" y="352" font-size="56" font-weight="800" fill="url(#eng-text)" letter-spacing="-1.5">Reach everyone.</text>

    <text x="64" y="404" font-size="20" font-weight="500" fill="#334155">A lightweight Marketing Automation</text>
    <text x="64" y="430" font-size="20" font-weight="500" fill="#334155">&amp; Transactional Messaging tool.</text>

    <g font-size="14" font-weight="600">
      <g transform="translate(64 472)">
        <rect width="118" height="34" rx="17" fill="#FFFFFF" stroke="#CBD5E1"/>
        <circle cx="20" cy="17" r="4" fill="#4F46E5"/>
        <text x="32" y="22" fill="#0F172A">Multi-channel</text>
      </g>
      <g transform="translate(192 472)">
        <rect width="106" height="34" rx="17" fill="#FFFFFF" stroke="#CBD5E1"/>
        <circle cx="20" cy="17" r="4" fill="#9333EA"/>
        <text x="32" y="22" fill="#0F172A">Open source</text>
      </g>
      <g transform="translate(308 472)">
        <rect width="110" height="34" rx="17" fill="#FFFFFF" stroke="#CBD5E1"/>
        <circle cx="20" cy="17" r="4" fill="#EC4899"/>
        <text x="32" y="22" fill="#0F172A">Visual flows</text>
      </g>
    </g>

    <g transform="translate(64 562)" font-size="16" font-weight="500">
      <circle cx="12" cy="12" r="12" fill="#0F172A"/>
      <path d="M 7 12 L 11 16 L 17 9" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="34" y="17" fill="#475569">github.com/PipelineFlowCRM</text>
    </g>
  </g>

  <!-- Right: workflow builder mock -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" filter="url(#card-shadow)">
    <rect x="600" y="80" width="620" height="480" rx="18" fill="#FFFFFF"/>
    <rect x="600" y="80" width="620" height="48" rx="18" fill="#FAF5FF"/>
    <rect x="600" y="110" width="620" height="18" fill="#FAF5FF"/>
    <line x1="600" y1="128" x2="1220" y2="128" stroke="#E9D5FF" stroke-width="1"/>
    <circle cx="620" cy="104" r="5" fill="#F87171"/>
    <circle cx="638" cy="104" r="5" fill="#FBBF24"/>
    <circle cx="656" cy="104" r="5" fill="#34D399"/>
    <text x="688" y="109" font-size="14" font-weight="500" fill="#64748B">Welcome series · Live</text>
    <rect x="1100" y="93" width="104" height="24" rx="12" fill="#F0FDF4"/>
    <circle cx="1116" cy="105" r="3.5" fill="#10B981"/>
    <text x="1126" y="110" font-size="13" font-weight="600" fill="#047857">Active</text>
  </g>

  <!-- Workflow connectors -->
  <g stroke="#CBD5E1" stroke-width="2" fill="none">
    <line x1="910" y1="206" x2="910" y2="244"/>
    <line x1="910" y1="312" x2="910" y2="348"/>
    <line x1="910" y1="416" x2="910" y2="452"/>
  </g>
  <g fill="#CBD5E1">
    <polygon points="906,242 914,242 910,250"/>
    <polygon points="906,346 914,346 910,354"/>
    <polygon points="906,450 914,450 910,458"/>
  </g>

  <!-- Workflow nodes -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">

    <!-- Trigger -->
    <g filter="url(#soft-shadow)">
      <rect x="800" y="150" width="220" height="56" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="800" y="150" width="4" height="56" fill="#10B981"/>
      <rect x="816" y="166" width="24" height="24" rx="6" fill="#ECFDF5"/>
      <polygon points="824,172 834,178 824,184" fill="#10B981"/>
      <text x="850" y="178" font-size="11" font-weight="700" fill="#10B981">TRIGGER</text>
      <text x="850" y="196" font-size="14" font-weight="700" fill="#0F172A">New signup</text>
    </g>

    <!-- Email -->
    <g filter="url(#soft-shadow)">
      <rect x="800" y="254" width="220" height="56" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="800" y="254" width="4" height="56" fill="#4F46E5"/>
      <rect x="816" y="270" width="24" height="24" rx="6" fill="#EEF2FF"/>
      <path d="M820 276 h16 v12 h-16 z" fill="none" stroke="#4F46E5" stroke-width="1.6"/>
      <path d="M820 276 l8 6 l8 -6" fill="none" stroke="#4F46E5" stroke-width="1.6" stroke-linejoin="round"/>
      <text x="850" y="282" font-size="11" font-weight="700" fill="#4F46E5">EMAIL</text>
      <text x="850" y="300" font-size="14" font-weight="700" fill="#0F172A">Welcome message</text>
    </g>

    <!-- SMS -->
    <g filter="url(#soft-shadow)">
      <rect x="800" y="358" width="220" height="56" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="800" y="358" width="4" height="56" fill="#9333EA"/>
      <rect x="816" y="374" width="24" height="24" rx="6" fill="#FAF5FF"/>
      <rect x="820" y="378" width="16" height="14" rx="3" fill="none" stroke="#9333EA" stroke-width="1.6"/>
      <path d="M824 392 l-2 4 l5 -4" fill="#9333EA" stroke="#9333EA" stroke-width="1.6" stroke-linejoin="round"/>
      <text x="850" y="386" font-size="11" font-weight="700" fill="#9333EA">SMS</text>
      <text x="850" y="404" font-size="14" font-weight="700" fill="#0F172A">Promo offer</text>
    </g>

    <!-- Push -->
    <g filter="url(#soft-shadow)">
      <rect x="800" y="462" width="220" height="56" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="800" y="462" width="4" height="56" fill="#EC4899"/>
      <rect x="816" y="478" width="24" height="24" rx="6" fill="#FDF2F8"/>
      <path d="M828 484 a4 4 0 0 0 -4 4 v3 h8 v-3 a4 4 0 0 0 -4 -4 z" fill="none" stroke="#EC4899" stroke-width="1.6"/>
      <line x1="822" y1="494" x2="834" y2="494" stroke="#EC4899" stroke-width="1.6"/>
      <text x="850" y="490" font-size="11" font-weight="700" fill="#EC4899">PUSH</text>
      <text x="850" y="508" font-size="14" font-weight="700" fill="#0F172A">Activation reminder</text>
    </g>

    <!-- Wait pill (between trigger and email, on the connector line) -->
    <g transform="translate(862 218)">
      <rect width="96" height="22" rx="11" fill="#F1F5F9" stroke="#E2E8F0"/>
      <circle cx="14" cy="11" r="5" fill="none" stroke="#64748B" stroke-width="1.4"/>
      <line x1="14" y1="11" x2="14" y2="8" stroke="#64748B" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="14" y1="11" x2="17" y2="11" stroke="#64748B" stroke-width="1.4" stroke-linecap="round"/>
      <text x="26" y="15" font-size="11" font-weight="600" fill="#475569">Wait 1 day</text>
    </g>

    <!-- Branch indicator pill -->
    <g transform="translate(862 322)">
      <rect width="96" height="22" rx="11" fill="#F1F5F9" stroke="#E2E8F0"/>
      <circle cx="14" cy="11" r="3" fill="#94A3B8"/>
      <text x="26" y="15" font-size="11" font-weight="600" fill="#475569">If not opened</text>
    </g>

    <!-- Branch indicator pill 2 -->
    <g transform="translate(862 426)">
      <rect width="96" height="22" rx="11" fill="#F1F5F9" stroke="#E2E8F0"/>
      <circle cx="14" cy="11" r="3" fill="#94A3B8"/>
      <text x="26" y="15" font-size="11" font-weight="600" fill="#475569">If not engaged</text>
    </g>
  </g>
</svg>
